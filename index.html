<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud99</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: white;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* Logo */
    .logo {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
    }

    /* Center Image */
    .background {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 90vh;
    }

    .background img {
      width: 90%;
      max-width: 800px;
      height: auto;
    }

    /* Links Section */
    .links {
      text-align: center;
      margin-top: -90px;
    }

    .links a {
      display: block;
      text-decoration: none;
      color: black;
      font-size: 18px;
      margin: 10px 0;
      transition: opacity 0.2s ease;
    }

    .links a:hover {
      opacity: 0.5;
    }

    @media (max-width: 768px) {
      .hero img {
        width: 90%;
      }

      .logo {
        width: 100px;
      }
    }
  </style>
</head>
<body>

  <!-- Logo -->
  <img src="Elements/cloud99_rotating.gif" alt="Cloud99 Logo" class="logo">

  <!-- Center Image -->
  <div class="background">
    <img src="Elements/WebsiteBackground.gif" alt="Background">
  </div>

  <!-- Navigation Links -->
  <div class="links">
    <a href="#"><u>SHOP</u></a>
    <a href="#"><u>CLDCLT</u></a>
    <a href="https://www.instagram.com/cloud99_ny/"><u>INSTAGRAM</u></a>
    <a href="#"><u>CONTACT</u></a>
  </div>

</body>
</html>
